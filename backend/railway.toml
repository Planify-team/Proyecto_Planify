[build]
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python manage.py migrate --noinput && python manage.py collectstatic --noinput --clear || true; python manage.py loaddata fixtures/places_curated.json || true; exec gunicorn config.wsgi:application --bind 0.0.0.0:${PORT:-8000} --workers 2 --timeout 60"
