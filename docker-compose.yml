version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: planify_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - planify_network

  redis:
    image: redis:7-alpine
    container_name: planify_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - planify_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: planify_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - ./backend:/app
      - ./docker:/docker
      - static_files:/app/staticfiles
      - media_files:/app/mediafiles
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/app/../docker/scripts/entrypoint.sh"]
    command: ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "2", "--reload"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - planify_network

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: planify_celery
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
    command: ["celery", "-A", "config", "worker", "--loglevel=info"]
    networks:
      - planify_network

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: planify_celery_beat
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
    command: ["celery", "-A", "config", "beat", "--loglevel=info"]
    networks:
      - planify_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: planify_frontend
    restart: unless-stopped
    environment:
      - VITE_API_TARGET=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - planify_network

  nginx:
    image: nginx:alpine
    container_name: planify_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - planify_network

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:

networks:
  planify_network:
    driver: bridge
